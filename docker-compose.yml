services:
  neo4j:
    image: neo4j:5.26
    container_name: smartgrids-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - ./services/GraphDB/import:/import

  streamlit-ui:
    build:
      context: ./services/gridsApp
    container_name: streamlit-ui
    restart: unless-stopped
    depends_on:
      - neo4j
      - graphrag-api
      - julia-optimizer
    ports:
      - "8501:8501"
    env_file:
      - .env

  graphrag-api:
    build:
      context: ./services/graphAssistantApp
    container_name: graphrag-api
    restart: unless-stopped
    depends_on:
      - neo4j
    ports:
      - "8000:8000"
    env_file:
      - .env

  julia-optimizer:
    build:
      context: ./services/julia
    container_name: julia-optimizer
    restart: unless-stopped
    ports:
      - "8081:8081"
    env_file:
      - .env

volumes:
  neo4j_data:
  neo4j_logs: